name: CI

# `pull_request` runs for every target branch on purpose: release and stacked
# PRs (feature -> release/x) would otherwise get no checks at all, which is how a
# PR can look green when nothing ever ran. Pushes stay limited to `main`.
on:
    push:
        branches: [main]
    pull_request:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    verify:
        name: verify (node ${{ matrix.node }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node: ["20", "22"]
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node ${{ matrix.node }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Format check
              run: npm run format:check

            - name: Lint
              run: npm run lint

            - name: Typecheck
              run: npm run typecheck

            # Coverage (not plain `test:run`) so the thresholds in
            # vitest.config.ts actually gate the build.
            - name: Test + coverage thresholds
              run: npm run test:coverage

            - name: Build
              run: npm run build
