name: Bundle size

# `pull_request` runs for every target branch on purpose: release and stacked
# PRs (feature -> release/x) would otherwise get no checks at all, which is how a
# PR can look green when nothing ever ran. Pushes stay limited to `main`.
on:
    pull_request:
    push:
        branches: [main]

permissions:
    contents: read
    pull-requests: write

jobs:
    size:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-node@v5
              with:
                  node-version: "22"
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install dependencies
              run: npm ci

            - name: Build
              run: npm run build

            - name: Check bundle size
              run: npx size-limit
