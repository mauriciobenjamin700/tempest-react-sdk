site_name: tempest-react-sdk
site_description: Blocos React/TypeScript compartilhados da Tempest — componentes, hooks, HTTP, auth, query, forms, tempo real, tema, i18n, telemetria, feature flags e offline.
site_url: https://mauriciobenjamin700.github.io/tempest-react-sdk/
repo_url: https://github.com/mauriciobenjamin700/tempest-react-sdk
repo_name: mauriciobenjamin700/tempest-react-sdk
docs_dir: docs

theme:
    name: material
    language: pt-BR
    palette:
        - media: "(prefers-color-scheme: light)"
          scheme: default
          toggle: { icon: material/weather-night, name: Tema escuro }
        - media: "(prefers-color-scheme: dark)"
          scheme: slate
          toggle: { icon: material/weather-sunny, name: Tema claro }
    features:
        - navigation.tracking
        - navigation.sections
        - navigation.top
        - navigation.indexes
        - content.code.copy
        - search.suggest
        - search.highlight
        - toc.follow

plugins:
    - search
    - i18n:
          docs_structure: suffix
          fallback_to_default: true
          reconfigure_material: true
          reconfigure_search: true
          languages:
              - { locale: pt, name: "Português (BR)", default: true, build: true }
              - locale: en
                name: English (US)
                build: true
                nav_translations:
                    Início: Home
                    Tutorial: Tutorial
                    Comece aqui: Start here
                    Estado: State
                    Buscando dados: Data fetching
                    Fluxo de autenticação: Auth flow
                    Receitas: Recipes
                    Cookbook: Cookbook
                    Integração FastAPI (full-stack): FastAPI integration (full-stack)
                    Offline Sync (FastAPI): Offline Sync (FastAPI)
                    Guia: Guide
                    Visão geral: Overview
                    Arquitetura: Architecture
                    Gallery (demo): Gallery (demo)
                    Estrutura de aplicação: App foundation
                    Scaffold (create-tempest-app): Scaffold (create-tempest-app)
                    CLI tempest: tempest CLI
                    OpenAPI (codegen): OpenAPI (codegen)
                    Vite & alias: Vite & alias
                    Roteamento: Routing
                    Geolocalização: Geolocation
                    Mapa do Brasil (br): Brazil map (br)
                    Estado (Zustand): State (Zustand)
                    Providers: Providers
                    Componentes: Components
                    Catálogo de componentes: Components catalogue
                    Entrada de dados: Data entry
                    Ação: Actions
                    Navegação: Navigation
                    Overlay: Overlay
                    Layout: Layout
                    Dados: Data
                    Status & feedback: Status & feedback
                    Identidade & micro: Identity & micro
                    Utilitários & headless: Utility & headless
                    Overlays & avançados: Overlays & advanced
                    Hooks: Hooks
                    Hooks utilitários: Utility hooks
                    Integrações: Integrations
                    HTTP: HTTP
                    Auth: Auth
                    OAuth (Google): OAuth (Google)
                    Query (TanStack): Query (TanStack)
                    SSE: SSE
                    WebSocket: WebSocket
                    Web Push: Web Push
                    Offline: Offline
                    PWA & Offline-First: PWA & Offline-First
                    Web Share: Web Share
                    Áudio: Audio
                    Formulários: Forms
                    Forms (zod): Forms (zod)
                    Forms BR: Forms BR
                    Estilo & Tema: Style & Theme
                    Estilos & Design Tokens: Styles & Design Tokens
                    Tema: Theme
                    i18n: i18n
                    Observabilidade: Observability
                    Telemetry: Telemetry
                    Feature Flags: Feature Flags
                    Logger: Logger
                    Error Boundary: Error Boundary
                    Projeto: Project
                    Utilitários: Utilities
                    Testing helpers: Testing helpers
                    Release pipeline: Release pipeline

markdown_extensions:
    - admonition
    - attr_list
    - def_list
    - tables
    - pymdownx.details
    - pymdownx.superfences
    - pymdownx.highlight
    - pymdownx.inlinehilite
    - pymdownx.tabbed
    - pymdownx.emoji

validation:
    nav: { omitted_files: ignore }
    links: { absolute_links: ignore }

nav:
    - Início: index.md
    - Tutorial:
          - Comece aqui: tutorial/index.md
          - Roteamento: tutorial/routing.md
          - Estado: tutorial/state.md
          - Buscando dados: tutorial/data-fetching.md
          - Formulários: tutorial/forms.md
          - Fluxo de autenticação: tutorial/auth-flow.md
    - Guia:
          - Visão geral: architecture.md
          - Gallery (demo): gallery.md
    - Estrutura de aplicação:
          - Scaffold (create-tempest-app): scaffold.md
          - CLI tempest: cli.md
          - OpenAPI (codegen): openapi.md
          - Vite & alias: vite-config.md
          - Roteamento: routing.md
          - Estado (Zustand): state.md
          - Providers: app-providers.md
    - Componentes:
          - Catálogo de componentes: components.md
          - Entrada de dados: components/inputs.md
          - Ação: components/actions.md
          - Navegação: components/navigation.md
          - Overlay: components/overlay.md
          - Layout: components/layout.md
          - Dados: components/data.md
          - Status & feedback: components/feedback.md
          - Identidade & micro: components/identity.md
          - Utilitários & headless: components/utility.md
          - Overlays & avançados: components/advanced.md
    - Hooks:
          - Hooks utilitários: hooks.md
    - Integrações:
          - HTTP: http.md
          - Auth: auth.md
          - OAuth (Google): oauth.md
          - Access Control (RBAC): access-control.md
          - Query (TanStack): query.md
          - Data Provider (CRUD): data-provider.md
          - SSE: sse.md
          - WebSocket: websocket.md
          - Geolocalização: geo.md
          - Mapa do Brasil (br): br.md
          - Web Push: push.md
          - Offline: offline.md
          - PWA & Offline-First: pwa.md
          - Web Share: share.md
          - Áudio: audio.md
          - Vision (ONNX): vision.md
          - Charts (recharts): charts.md
          - Rich Text Editor (tiptap): editor.md
    - Formulários:
          - Forms (zod): forms.md
          - Forms BR: forms-br.md
    - Estilo & Tema:
          - Estilos & Design Tokens: styles.md
          - Tema: theme.md
          - i18n: i18n.md
    - Observabilidade:
          - Telemetry: telemetry.md
          - Feature Flags: feature-flags.md
          - Logger: logger.md
          - Error Boundary: error-boundary.md
    - Receitas:
          - Cookbook: cookbook.md
          - Integração FastAPI (full-stack): integration-fastapi.md
          - Offline Sync (FastAPI): offline-sync.md
          - Utilitários: utilities.md
    - Projeto:
          - Testing helpers: testing.md
          - Release pipeline: release.md
